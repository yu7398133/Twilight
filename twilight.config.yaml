# 后台系统配置
backend:
    name: github
    repo: yu7398133/Twilight # 请替换为您的 GitHub 仓库
    branch: main # 请替换为您的分支名称
    site_domain: blog2.chenyusc.eu.org # 请替换为您的域名
    base_url: https://blog2.chenyusc.eu.org  # 请替换为您的 URL
    auth_endpoint: oauth # OAuth 路由由集成提供


# 设置后台系统语言 (zh_Hans 简体中文 | en 英文 | ...)
locale: zh_Hans


# 媒体目录配置
media_folder: "public/assets/images" # 媒体文件存储路径
public_folder: "/assets/images" # 公共访问路径


# 内容管理配置
collections:

    - # 文章
        # 集合名称
        name: "posts"
        # 后台显示标签
        label: "文章"
        # 内容存储目录
        folder: "src/content/posts"
        # 目录嵌套配置
        meta:
            # 路径配置
            path:
                # 后台显示标签
                label: "路径"
                # 记录路径的部件
                widget: hidden # 隐藏
                # 索引文件名称（用于嵌套集合）
                index_file: "_index"
        nested:
            # 最大嵌套深度
            depth: 10
            # 摘要模板，用于树状菜单中文件夹的显示名称
            summary: '{{dirname}}'
            # 是否支持子文件夹
            subfolders: false # 由于文章是独立的 .md 文件，需要设为 false 以防止 CMS 寻找文件夹下的 _index.md
        ## 列表页分组配置
        #view_groups:
        #    - # 按文件夹分组
        #        # 分组标签
        #        label: "Folder"
        #        # 分组依据的字段
        #        field: "path"
        #        # 分组匹配模式
        #        pattern: '^([^/]+)/' # 匹配第一个路径段（即文件夹名）
        # 允许创建新条目
        create: true
        # 文件命名规则
        slug: "{{slug}}"
        # 集合特定的媒体文件夹配置
        media_folder: "" # 留空表示使用相对路径
        public_folder: "" # 留空表示使用相对路径
        # 字段列表
        fields:
            - # 标题
                { name: "title", label: "标题", widget: "string" }
            - # 发布日期
                { name: "published", label: "发布日期", widget: "datetime" }
            - # 更新日期
                { name: "updated", label: "更新日期", widget: "datetime", required: false }
            - # 描述
                { name: "description", label: "描述", widget: "text", required: false }
            - # 封面图
                { name: "cover", label: "封面", widget: "image", required: false }
            - # 标签
                { name: "tags", label: "标签", widget: "list", default: [], required: false }
            - # 分类
                { name: "category", label: "分类", widget: "string", required: false }
            - # 草稿
                { name: "draft", label: "草稿", widget: "boolean", default: false }
            - # 正文
                { name: "body", label: "正文", widget: "markdown" }

    - # 日记
        # 集合名称
        name: "diary"
        # 后台显示标签
        label: "日记"
        # 内容存储目录
        folder: "src/content/diary"
        # 条目路径配置
        path: "{{slug}}/{{slug}}" # {文件夹}/{文件名}
        # 允许创建新条目
        create: true
        # 文件命名规则
        slug: "{{year}}-{{month}}-{{day}}-{{hour}}-{{minute}}"
        # 文件存储格式
        format: "json"
        # 集合特定的媒体文件夹配置
        media_folder: "" # 留空表示使用相对路径
        public_folder: "" # 留空表示使用相对路径
        # 字段列表
        fields:
            - # 日记标题
                { name: "title", label: "标题", widget: "string" }
            - # 日记内容
                { name: "content", label: "内容", widget: "text" }
            - # 日记日期
                { name: "date", label: "日期", widget: "datetime" }
            - # 图片列表
                name: "images"
                label: "图片"
                widget: "list"
                required: false
                default: []
                field: { name: "image", label: "图片", widget: "image" }

    - # 相册
        # 集合名称
        name: "albums"
        # 后台显示标签
        label: "相册"
        # 内容存储目录
        folder: "src/content/albums"
        # 条目路径配置
        path: "{{slug}}/{{slug}}" # {文件夹}/{文件名}
        # 允许创建新条目
        create: true
        # 文件命名规则
        slug: "{{slug}}"
        # 文件存储格式
        format: "json"
        # 集合特定的媒体文件夹配置
        media_folder: "" # 留空表示使用相对路径
        public_folder: "" # 留空表示使用相对路径
        # 字段列表
        fields:
            - # 相册标题
                { name: "title", label: "标题", widget: "string" }
            - # 相册描述
                { name: "description", label: "描述", widget: "text", required: false }
            - # 相册封面
                { name: "cover", label: "封面", widget: "image" }
            - # 日期
                { name: "date", label: "日期", widget: "datetime" }
            - # 地点
                { name: "location", label: "地点", widget: "string", required: false }
            - # 标签
                { name: "tags", label: "标签", widget: "list", required: false, default: [] }
            - # 布局方式
                { name: "layout", label: "布局", widget: "select", options: ["grid", "masonry", "list"], default: "grid" }
            - # 列数
                { name: "columns", label: "列数", widget: "number", default: 3, value_type: "int", min: 1, max: 6 }
            - # 照片列表
                name: "photos"
                label: "照片"
                widget: "list"
                required: false
                fields:
                    - # 图片路径
                        { name: "src", label: "图片", widget: "image" }
                    - # 图片描述
                        { name: "alt", label: "图片描述", widget: "string", required: false }
                    - # 图片标题
                        { name: "title", label: "标题", widget: "string", required: false }
                    - # 图片说明
                        { name: "description", label: "描述", widget: "text", required: false }
                    - # 标签
                        { name: "tags", label: "标签", widget: "list", required: false, default: [] }
                    - # 拍摄日期
                        { name: "date", label: "日期", widget: "datetime", required: false }
            - # 是否可见
                { name: "visible", label: "可见", widget: "boolean", default: true, required: false }

    - # 项目
        # 集合名称
        name: "projects"
        # 后台显示标签
        label: "项目"
        # 内容存储目录
        folder: "src/content/projects"
        # 条目路径配置
        path: "{{slug}}/{{slug}}" # {文件夹}/{文件名}
        # 允许创建新条目
        create: true
        # 文件命名规则
        slug: "{{slug}}"
        # 文件存储格式
        format: "json"
        # 集合特定的媒体文件夹配置
        media_folder: "" # 留空表示使用相对路径
        public_folder: "" # 留空表示使用相对路径
        # 字段列表
        fields:
            - # 项目标题
                { name: "title", label: "标题", widget: "string" }
            - # 项目描述
                { name: "description", label: "描述", widget: "text" }
            - # 项目封面
                { name: "image", label: "封面", widget: "image", required: false }
            - # 项目类别
                { name: "category", label: "类别", widget: "select", options: ["library","ai","software","website","game"] }
            - # 技术栈
                { name: "techStack", label: "技术栈", widget: "list", default: [] }
            - # 项目状态
                { name: "status", label: "状态", widget: "select", options: ["completed","in-progress","planned"] }
            - # 在线演示
                { name: "liveDemo", label: "在线演示", widget: "string", required: false }
            - # 源代码
                { name: "sourceCode", label: "源代码", widget: "string", required: false }
            - # 开始日期
                { name: "startDate", label: "开始日期", widget: "datetime" }
            - # 结束日期
                { name: "endDate", label: "结束日期", widget: "datetime", required: false }
            - # 是否精选
                { name: "featured", label: "精选", widget: "boolean", required: false, default: false }
            - # 标签
                { name: "tags", label: "标签", widget: "list", required: false, default: [] }

    - # 技能
        # 集合名称
        name: "skills"
        # 后台显示标签
        label: "技能"
        # 内容存储目录
        folder: "src/content/skills"
        # 允许创建新条目
        create: true
        # 文件命名规则
        slug: "{{slug}}"
        # 文件存储格式
        format: "json"
        # 字段列表
        fields:
            - # 技能名称
                { name: "name", label: "名称", widget: "string" }
            - # 技能描述
                { name: "description", label: "描述", widget: "text" }
            - # 图标
                { name: "icon", label: "图标", widget: "string" }
            - # 技能类别
                { name: "category", label: "类别", widget: "select", options: ["ai","backend","client","frontend","database","engines","tools","others"] }
            - # 熟练程度
                { name: "level", label: "熟练程度", widget: "select", options: ["beginner","intermediate","advanced","expert"] }
            - # 经验
                name: "experience"
                label: "经验"
                widget: "object"
                fields:
                    - # 年
                        { name: "years", label: "年", widget: "number", value_type: "int", min: 0 }
                    - # 月
                        { name: "months", label: "月", widget: "number", value_type: "int", min: 0, max: 11 }
            - # 相关项目
               { name: "projects", label: "相关项目", widget: "list", required: false, default: [] }
            - # 相关认证
               { name: "certifications", label: "认证", widget: "list", required: false, default: [] }
            - # 主题颜色
               { name: "color", label: "颜色", widget: "string", required: false }

    - # 时间线
        # 集合名称
        name: "timeline"
        # 后台显示标签
        label: "时间线"
        # 内容存储目录
        folder: "src/content/timeline"
        # 允许创建新条目
        create: true
        # 文件命名规则
        slug: "{{slug}}"
        # 文件存储格式
        format: "json"
        # 字段列表
        fields:
            - # 标题
                { name: "title", label: "标题", widget: "string" }
            - # 描述
                { name: "description", label: "描述", widget: "text" }
            - # 类型
                { name: "type", label: "类型", widget: "select", options: ["education","work","project","achievement"] }
            - # 开始日期
                { name: "startDate", label: "开始日期", widget: "datetime" }
            - # 结束日期
                { name: "endDate", label: "结束日期", widget: "datetime", required: false }
            - # 地点
                { name: "location", label: "地点", widget: "string", required: false }
            - # 组织/机构
                { name: "organization", label: "组织", widget: "string", required: false }
            - # 职位
                { name: "position", label: "职位", widget: "string", required: false }
            - # 相关技能
                { name: "skills", label: "技能", widget: "list", required: false, default: [] }
            - # 相关成就
                { name: "achievements", label: "成就", widget: "list", required: false, default: [] }
            - # 相关链接
                name: "links"
                label: "链接"
                widget: "list"
                required: false
                fields:
                    - # 链接名称
                        { name: "name", label: "名称", widget: "string" }
                    - # 链接地址
                        { name: "url", label: "链接", widget: "string" }
                    - # 链接类型
                        { name: "type", label: "类型", widget: "select", options: ["certificate","project","other"] }
            - # 图标
                { name: "icon", label: "图标", widget: "string", required: false }
            - # 主题颜色
                { name: "color", label: "颜色", widget: "string", required: false }

    - # 友链
        # 集合名称
        name: "friends"
        # 后台显示标签
        label: "友链"
        # 内容存储目录
        folder: "src/content/friends"
        # 允许创建新条目
        create: true
        # 文件命名规则
        slug: "{{slug}}"
        # 文件存储格式
        format: "json"
        # 字段列表
        fields:
            - # 网站名称
                { name: "title", label: "名称", widget: "string" }
            - # 头像链接
                { name: "imgurl", label: "头像链接", widget: "string" }
            - # 网站描述
                { name: "desc", label: "描述", widget: "text" }
            - # 网站链接
                { name: "siteurl", label: "网站链接", widget: "string" }
            - # 标签
                { name: "tags", label: "标签", widget: "list", required: false, default: [] }

    - # 友链说明
        # 集合名称
        name: "page_friends"
        # 后台显示标签
        label: "友链页面"
        # 文件列表
        files:
            - # friends.md
                name: "friends"
                label: "友链"
                file: "src/content/friends.md"
                fields:
                    #- # 名称
                    #    { name: "title", label: "标题", widget: "string", required: false }
                    #- # 描述
                    #    { name: "description", label: "描述", widget: "string", required: false }
                    - # 内容
                        { name: "body", label: "正文", widget: "markdown" }

    - # 关于
        # 集合名称
        name: "page_about"
        # 后台显示标签
        label: "关于"
        # 文件列表
        files:
            - # about.md
                name: "about"
                label: "关于"
                file: "src/content/about.md"
                fields:
                    #- # 名称
                    #    { name: "title", label: "标题", widget: "string", required: false }
                    #- # 描述
                    #    { name: "description", label: "描述", widget: "string", required: false }
                    - # 内容
                        { name: "body", label: "正文", widget: "markdown" }


# 编辑器配置
editor:
    # 启用预览功能
    preview: true
